<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Asistencia - CECYTEC</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #00875a; font-size: 24px; margin-bottom: 20px; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; display: none; }
        .exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 25px; border-radius: 12px; max-width: 400px; width: 90%; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background: #00875a; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-close { background: #7f8c8d; color: white; border: none; padding: 8px 15px; margin-top: 10px; width: 100%; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Control de Acceso Escolar</h1>
    <div id="reader"></div>
    <div id="resultado"></div>
</div>

<div id="modalAlta" class="modal">
    <div class="modal-content">
        <h3>🔑 Registrar Alumno Nuevo</h3>
        <p style="font-size: 12px; color: #7f8c8d; margin-bottom: 15px;">La credencial y su URL oficial se vincularon automáticamente.</p>
        
        <form id="formAltaAlumno">
            <input type="hidden" id="modalKeyQr">
            <input type="hidden" id="modalUrlCompleta">
            
            <div class="form-group">
                <label for="modalNumControl">Número de Control:</label>
                <input type="text" id="modalNumControl" required placeholder="Ej. 22315060..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="modalNombre">Nombre Completo del Alumno:</label>
                <input type="text" id="modalNombre" required placeholder="APELLIDOS NOMBRE(S)" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="modalTelefono">Teléfono del Tutor (10 dígitos):</label>
                <input type="tel" id="modalTelefono" required placeholder="Ej. 8781234567" pattern="[0-9]{10}">
            </div>
            
            <button type="submit" class="btn-submit">Guardar en Base de Datos</button>
            <button type="button" class="btn-close" onclick="cerrarModal()">Cancelar</button>
        </form>
    </div>
</div>

<script>
    let html5QrcodeScanner;
    let escaneoBloqueado = false; 

    function mostrarResultado(mensaje, tipo) {
        const resDiv = document.getElementById("resultado");
        resDiv.innerText = mensaje;
        resDiv.className = ""; 
        resDiv.classList.add(tipo);
        resDiv.style.display = "block";
    }

    async function onScanSuccess(decodedText, decodedResult) {
        if (escaneoBloqueado) return; 
        escaneoBloqueado = true; 
        
        mostrarResultado("Analizando credencial...", "alerta");

        try {
            const response = await fetch("/registrar-asistencia", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ texto_qr: decodedText })
            });
            const data = await response.json();

            if (data.status === "exito") {
                mostrarResultado(data.mensaje, "exito");
                setTimeout(() => { escaneoBloqueado = false; }, 1500);
            } else if (data.status === "alerta") {
                mostrarResultado(data.mensaje, "error");
                setTimeout(() => { escaneoBloqueado = false; }, 3500);
            } else if (data.status === "nuevo_registro") {
                mostrarResultado("Abriendo alta rápida...", "alerta");
                // Le pasamos la Key Y ADEMÁS la URL completa capturada por el lente
                abrirModalAlta(data.key_qr, data.url_completa);
            } else {
                mostrarResultado(data.mensaje, "error");
                setTimeout(() => { escaneoBloqueado = false; }, 3000);
            }
        } catch (error) {
            mostrarResultado("Error de conexión con el servidor.", "error");
            setTimeout(() => { escaneoBloqueado = false; }, 3000);
        }
    }

    function abrirModalAlta(keyQr, urlCompleta) {
        document.getElementById("modalKeyQr").value = keyQr;
        document.getElementById("modalUrlCompleta").value = urlCompleta; // Guarda la URL oculta
        document.getElementById("formAltaAlumno").reset();
        document.getElementById("modalAlta").style.display = "flex";
        
        setTimeout(() => {
            document.getElementById("modalNumControl").focus();
        }, 100);
    }

    function cerrarModal() {
        document.getElementById("modalAlta").style.display = "none";
        escaneoBloqueado = false; 
    }

    document.getElementById("formAltaAlumno").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const payload = {
            key_qr: document.getElementById("modalKeyQr").value,
            url_credencial: document.getElementById("modalUrlCompleta").value, // Añadido al envío HTTP
            num_control: document.getElementById("modalNumControl").value,
            alumno: document.getElementById("modalNombre").value,
            telefono_tutor: document.getElementById("modalTelefono").value
        };

        mostrarResultado("Guardando en Google Sheets...", "alerta");
        document.getElementById("modalAlta").style.display = "none";

        try {
            const response = await fetch("/dar-de-alta", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            if (data.status === "exito") {
                mostrarResultado(data.mensaje, "exito");
            } else {
                mostrarResultado(data.mensaje, "error");
            }
        } catch (error) {
            mostrarResultado("Error al guardar.", "error");
        } finally {
            setTimeout(() => { escaneoBloqueado = false; }, 2000);
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 15, qrbox: { width: 250, height: 250 }, rememberLastUsedCamera: true }, false
        );
        html5QrcodeScanner.render(onScanSuccess);
    });
</script>

</body>
</html>
